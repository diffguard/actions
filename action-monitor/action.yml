name: 'DiffGuard Action Monitor'
description: 'Monitors GitHub Actions workflow files for supply chain risks'
inputs:
  token:
    description: 'DiffGuard API token'
    required: true
  api-url:
    description: 'DiffGuard API URL'
    required: true
    default: 'https://api.diffguard.io'
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    DIFFGUARD_TOKEN: ${{ inputs.token }}
    DIFFGUARD_API_URL: ${{ inputs.api-url }}
