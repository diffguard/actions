name: 'DiffGuard Passive Monitor'
description: 'Monitors resolved dependency versions and hashes after install'
inputs:
  token:
    description: 'DiffGuard API token'
    required: true
  api-url:
    description: 'DiffGuard API URL'
    required: true
    default: 'https://api.diffguard.io'
  lockfile:
    description: 'Path to lockfile'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    DIFFGUARD_TOKEN: ${{ inputs.token }}
    DIFFGUARD_API_URL: ${{ inputs.api-url }}
    DIFFGUARD_LOCKFILE: ${{ inputs.lockfile }}
